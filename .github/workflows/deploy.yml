name: website-monitoring-ci

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "lambda_function/**"

  workflow_dispatch:
    inputs:
      action:
        description: "deploy or destroy"
        required: true
        type: choice
        options:
          - deploy
          - destroy
        default: deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest lambda_function/test_index.py -v

